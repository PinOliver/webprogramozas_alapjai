services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mozi
      POSTGRES_USER: mozi
      POSTGRES_PASSWORD: mozi
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mozi -d mozi"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://mozi:mozi@db:5432/mozi
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: